<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Pedagogy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #fff;
        color: #000000;
        font-family: "Open Sans", system-ui, sans-serif;
        overflow: hidden;
        height: 100vh;
      }
      .sk {
        background: #fff;
        position: relative;
        padding: 0.5rem 0;
        width: 100%;
      }
      canvas {
        width: 100%;
        display: block;
      }
      .sktip {
        position: absolute;
        background: #fff;
        border: 0.5px solid #ccc;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: #000000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.12s;
        font-family: var(--font-sans, sans-serif);
        max-width: 240px;
        line-height: 1.5;
      }
      .sk-btns {
        position: absolute;
        top: 0; /* overridden by JS */
        display: flex;
        align-items: center;
        gap: 0px;
      }
      .sk-btn {
        border: none;
        background: transparent;
        color: #000000;
        /* border-radius: 6px; */
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        transition: opacity 0.15s;
        opacity: 0.45;
      }
      .sk-btn svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .sk-btn:hover { opacity: 1; }
      
    </style>
  </head>
  <body>
    <div class="sk">
      <canvas id="sk"></canvas>
      <div class="sktip" id="sktip"></div>
      <!-- Buttons absolutely positioned bottom-right of canvas -->
      <div class="sk-btns">
        <button type="button" class="sk-btn" onclick="saveAs600DpiPng()" title="Save JPG">
          <svg viewBox="0 0 24 24"><path d="M12 3v13m0 0-4-4m4 4 4-4M5 20h14"/></svg>
        </button>
        <button type="button" class="sk-btn" onclick="saveAsSvg()" title="Save SVG">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </button>
        <button type="button" class="sk-btn" onclick="loadAndRender()" title="Reload from Excel">
          <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 14.93-4H15m4 0V4"/><path d="M20 12a8 8 0 0 1-14.93 4H9m-4 0v4"/></svg>
        </button>
        <button type="button" class="sk-btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="Full screen">
          <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script>
      // Cache-bust consts + app on every page load
      const _v = Date.now() + Math.random();
      document.write('<script src="./bipartite__3__way.consts.js?v=' + _v + '"><\/script>');
      document.write('<script src="./bipartite__3__way.app.js?v=' + _v + '"><\/script>');
    </script>
  </body>
</html>
